<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dinner?</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="hearts">
    <span class="heart" style="top:15%;left:12%;">❤</span>
    <span class="heart" style="top:25%;right:15%;">❤</span>
    <span class="heart" style="bottom:20%;left:18%;">❤</span>
    <span class="heart" style="bottom:15%;right:20%;">❤</span>
  </div>

  <section id="start" class="screen active">
    <h1>Dinner?</h1>
    <button class="yes-btn" onclick="showMenu()">YES</button>
  </section>

  <section id="menu" class="screen">
    <h2>What are we eating?</h2>

    <div class="cards">
      <button class="card" onclick="choose('Your cooking','THE BEST CHOICE. 👨‍🍳❤️')">🍳 Your cooking</button>
      <button class="card" onclick="choose('Japanese','Lets do it! Some sake afterwards? 🍶')">🍣 Japanese</button>
      <button class="card" onclick="choose('Thai','Never thought you\\'d pick this. 🌶')">🌶 Thai</button>
      <button class="card" onclick="choose('Western','Lets gooo! We haven\\'t really had proper Western yet. 🍔')">🍔 Western</button>
      <button class="card" onclick="choose('Chicken Rice','Can\\'t go wrong with comfort food. 😌')">🍗 Chicken Rice</button>
      <button class="card" onclick="choose('HDL','YAYYY GOOD CHOICE! 🎉<br><br>We\\'ll complain about how full we are afterwards 😂')">🍲 HDL</button>
      <button class="card" onclick="choose('You','Well... I guess you\\'re my main dish. ❤️')">😊 You</button>
    </div>
  </section>

  <section id="result" class="screen">
    <div id="responseText" class="response"></div>
    <button id="lockButton" class="lock-btn" onclick="confirmDate()">Lock it in ✅</button>
    <button class="back-btn" onclick="showMenu()">Try another option</button>
    <p id="saveStatus" class="small-note"></p>
  </section>

  <section id="final" class="screen">
    <h2>🎉 Date confirmed.</h2>
    <p>See you tonight.</p>
    <button class="back-btn" onclick="showMenu()">Back to food menu</button>
  </section>

  <!-- Hidden iframe prevents Google Forms from redirecting the page -->
  <iframe name="hidden_iframe" id="hidden_iframe" style="display:none;"></iframe>

  <!-- Hidden Google Form submission -->
  <form
    id="googleForm"
    action="https://docs.google.com/forms/d/e/1FAIpQLScdxbgmB423wFdzlqV65sKu40q2QL3K4LsvV2XVgbRbmjsgAw/formResponse"
    method="POST"
    target="hidden_iframe"
    style="display:none;"
  >
    <input type="hidden" name="entry.241731394" id="foodChoiceInput" />
  </form>

  <script src="script.js"></script>
</body>
</html>
