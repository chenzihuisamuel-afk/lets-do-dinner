<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dinner?</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="hearts">
    <span class="heart" style="top:15%;left:12%;">❤</span>
    <span class="heart" style="top:25%;right:15%;">❤</span>
    <span class="heart" style="bottom:20%;left:18%;">❤</span>
    <span class="heart" style="bottom:15%;right:20%;">❤</span>
  </div>

  <main class="app">
    <section id="start" class="screen active">
      <h1>Dinner?</h1>
      <button id="yesButton" class="yes-btn">YES</button>
    </section>

    <section id="menu" class="screen">
      <h2>What are we eating?</h2>

      <div class="cards">
        <button class="card" data-food="Your cooking">🍳 Your cooking</button>
        <button class="card" data-food="Japanese">🍣 Japanese</button>
        <button class="card" data-food="Thai">🌶 Thai</button>
        <button class="card" data-food="Western">🍔 Western</button>
        <button class="card" data-food="Chicken Rice">🍗 Chicken Rice</button>
        <button class="card" data-food="HDL">🍲 HDL</button>
        <button class="card" data-food="You">😊 You</button>
      </div>
    </section>

    <section id="result" class="screen">
      <div id="responseText" class="response"></div>
      <button id="lockButton" class="lock-btn">Lock it in ✅</button>
      <button id="tryAgainButton" class="back-btn">Try another option</button>
      <p id="saveStatus" class="small-note"></p>
    </section>

    <section id="final" class="screen">
      <h2>🎉 Date confirmed.</h2>
      <p>See you tonight.</p>
      <button id="backToMenuButton" class="back-btn">Back to food menu</button>
    </section>
  </main>

  <iframe name="hidden_iframe" id="hidden_iframe" style="display:none;"></iframe>

  <form
    id="googleForm"
    action="https://docs.google.com/forms/d/e/1FAIpQLScdxbgmB423wFdzlqV65sKu40q2QL3K4LsvV2XVgbRbmjsgAw/formResponse"
    method="POST"
    target="hidden_iframe"
    style="display:none;"
  >
    <input type="hidden" name="entry.241731394" id="foodChoiceInput" />
  </form>

  <script src="script.js"></script>
</body>
</html>
